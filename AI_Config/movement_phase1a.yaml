# ML-Agents Phase 1-A: Movement Training Config
#
# Keep this file OUTSIDE of Unity's Assets folder (e.g. D:\WorkSpace\2026Capstone\AI_Config\)
# to avoid Unity importing it as a TextAsset unnecessarily.
#
# Run (from project root):
#   conda activate mlagents
#   mlagents-learn AI_Config/movement_phase1a.yaml --run-id=phase1a_run01
#   -> Then press Play in the Unity Editor to start training.
#
# Resume:
#   mlagents-learn AI_Config/movement_phase1a.yaml --run-id=phase1a_run01 --resume
#
# Monitor:
#   tensorboard --logdir results
#   Open http://localhost:6006 in a browser.
#
# Use trained model (inference):
#   Drag results/phase1a_run01/MovementAgent.onnx into the Model slot of
#   BehaviorParameters, and switch Behavior Type to Inference Only.

behaviors:
  # This key MUST match the Behavior Name in BehaviorParameters.
  MovementAgent:
    trainer_type: ppo

    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    keep_checkpoints: 10
    checkpoint_interval: 200000
    max_steps: 2000000
    time_horizon: 64
    summary_freq: 10000