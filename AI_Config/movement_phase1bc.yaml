# ML-Agents Phase 1-BC: Obstacle + Jump Training Config
#
# Keep this file OUTSIDE of Unity's Assets folder (e.g. D:\WorkSpace\2026Capstone\AI_Config\).
#
# Run (from project root):
#   conda activate mlagents
#   mlagents-learn AI_Config/movement_phase1bc.yaml --run-id=phase1bc_run01
#   -> Then press Play in Unity Editor to start training.
#
# Resume:
#   mlagents-learn AI_Config/movement_phase1bc.yaml --run-id=phase1bc_run01 --resume
#
# Monitor:
#   tensorboard --logdir results
#
# Notes:
#   - Vector observation size: 9 (pos xz, vel xyz, target_rel xz, distance, grounded)
#   - Ray observation: via RayPerceptionSensorComponent3D attached to NPCAgent prefab
#   - Actions: Continuous 2 (move x/z) + Discrete 1 [2] (jump 0/1)

behaviors:
  # MUST match Behavior Name on the NPCAgent prefab's BehaviorParameters.
  MovementAgentBC:
    trainer_type: ppo

    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      # Increased vs Phase 1-A (128/2) to handle ray + obstacle complexity.
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    keep_checkpoints: 10
    checkpoint_interval: 500000

    # Phase 1-BC expected to need more steps than 1-A (was 2M, converged at ~260k).
    max_steps: 5000000

    time_horizon: 64
    summary_freq: 10000